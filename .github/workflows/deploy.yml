name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build:single
      - run: npm run release:single-html

      - name: Prepare standalone Pages artifact
        run: |
          mkdir -p pages-dist
          cp release/gpt-image-playground.html pages-dist/index.html

      - name: Verify standalone Pages artifact
        run: |
          test -s pages-dist/index.html
          if grep -E 'https://fontsapi\.zeoseven\.com|https://cdn\.jsdelivr\.net/npm/@lobehub/webfont-harmony-sans-sc|api\.github\.com|releases/latest|<script[^>]+src=|<link[^>]+rel=["'\'']stylesheet|<link[^>]+rel=["'\'']manifest' pages-dist/index.html; then
            echo "Standalone Pages artifact still contains blocked external references."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
